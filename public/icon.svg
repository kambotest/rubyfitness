<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Soft pink gradient — iOS and Android both mask rounded-rect icons -->
  <rect width="512" height="512" rx="112" fill="#FBE8E4"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)" opacity="0.7"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D9C0"/>
      <stop offset="60%" stop-color="#FBE8E4"/>
      <stop offset="100%" stop-color="#E5B7B3"/>
    </linearGradient>
  </defs>

  <!-- Athletic figure: a striding mother with a baby in a chest
       carrier. Charcoal stroke, no fill, round caps + joins for a soft
       hand-drawn feel. -->
  <g stroke="#2A2823" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Mother's head -->
    <circle cx="200" cy="156" r="32"/>

    <!-- Mother's torso, leaning forward in a stride -->
    <path d="M200 188 C 200 222, 196 252, 208 280 L 246 314"/>

    <!-- Front arm wrapping the baby -->
    <path d="M208 240 C 240 246, 280 252, 300 270
             C 312 282, 312 300, 296 312"/>

    <!-- Back arm in a running swing -->
    <path d="M198 232 C 168 242, 144 268, 130 296"/>

    <!-- Forward leg (mid-stride) -->
    <path d="M218 296 L 252 354 L 246 410"/>

    <!-- Trailing leg, pushing off -->
    <path d="M210 290 L 178 348 L 200 402"/>

    <!-- Baby head — nestled against the mother's chest -->
    <circle cx="284" cy="276" r="22" stroke-width="12"/>

    <!-- Baby body — small curve inside the carrier -->
    <path d="M268 296 Q 284 312, 300 298" stroke-width="11"/>

    <!-- Chest carrier strap — single curve over the mother's shoulder -->
    <path d="M218 220 Q 256 220, 290 250" stroke-width="9" opacity="0.55"/>
  </g>

  <!-- Subtle ground line — suggests motion -->
  <path d="M120 446 L 392 446" stroke="#2A2823" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
</svg>
